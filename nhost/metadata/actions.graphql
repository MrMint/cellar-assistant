type Query {
  beer_defaults(
    hint: item_defaults_hint!
  ): beer_defaults_result
}

type Query {
  coffee_defaults(
    hint: item_defaults_hint!
  ): coffee_defaults_result
}

type Query {
  create_search_vector(
    text: String
    image: String
  ): vector!
}

type Mutation {
  item_image_upload(
    input: item_image_upload_input!
  ): item_image_upload_result
}

type Mutation {
  processRecipePhoto(
    input: ProcessRecipePhotoInput!
  ): ProcessRecipePhotoOutput
}

type Mutation {
  refresh_places: refresh_places_result
}

type Mutation {
  reviewUserPlace(
    input: ReviewUserPlaceInput!
  ): ReviewUserPlaceOutput
}

type Query {
  sake_defaults(
    hint: item_defaults_hint!
  ): sake_defaults_result
}

type Query {
  search_nearby_places(
    input: search_nearby_places_input!
  ): search_nearby_places_result
}

type Query {
  spirit_defaults(
    hint: item_defaults_hint!
  ): spirit_defaults_result
}

type Query {
  wine_defaults(
    hint: item_defaults_hint!
  ): wine_defaults_result
}

enum ItemType {
  BEER
  WINE
  SPIRIT
  COFFEE
  SAKE
}

input item_defaults_input {
  barcode: String
  barcodeType: String
  frontLabelFileId: uuid
  backLabelFileId: uuid
}

input item_defaults_hint {
  barcode: String
  barcodeType: String
  frontLabelFileId: uuid
  backLabelFileId: uuid
}

input item_image_upload_input {
  image: String!
  item_id: uuid!
  item_type: ItemType!
}

input search_nearby_places_input {
  latitude: Float!
  longitude: Float!
  radius: Int!
  categories: [String!]!
  limit: Int!
}

input ProcessRecipePhotoInput {
  photoId: String!
  userId: String!
  placeId: String
  menuItemId: String
}

type wine_defaults_result {
  alcohol_content_percentage: numeric
  description: String
  barcode_code: String
  barcode_type: String
  name: String
  region: String
  country: String
  special_designation: String
  variety: String
  style: String
  vineyard_designation: String
  vintage: date
  item_onboarding_id: String!
  confidence: Float
  brand_id: String
  brand_name: String
  is_new_brand: Boolean
}

type beer_defaults_result {
  alcohol_content_percentage: numeric
  description: String
  barcode_code: String
  barcode_type: String
  name: String
  country: String
  style: String
  vintage: date
  international_bitterness_unit: Int
  item_onboarding_id: String!
  confidence: Float
  brand_id: String
  brand_name: String
  is_new_brand: Boolean
}

type spirit_defaults_result {
  alcohol_content_percentage: numeric
  description: String
  barcode_code: String
  barcode_type: String
  name: String
  country: String
  style: String
  vintage: date
  type: String
  distillery: String
  item_onboarding_id: String!
  confidence: Float
  brand_id: String
  brand_name: String
  is_new_brand: Boolean
}

type item_image_upload_result {
  id: uuid!
}

type coffee_defaults_result {
  description: String
  barcode_code: String
  barcode_type: String
  name: String
  country: String
  process: String
  species: String
  cultivar: String
  roast_level: String
  item_onboarding_id: String!
  confidence: Float
  brand_id: String
  brand_name: String
  is_new_brand: Boolean
}

type sake_defaults_result {
  description: String
  barcode_code: String
  barcode_type: String
  name: String
  country: String
  type: String
  category: String
  rice_variety: String
  serving_temperature: String
  alcohol_content_percentage: numeric
  item_onboarding_id: String!
  confidence: Float
  brand_id: String
  brand_name: String
  is_new_brand: Boolean
}

type search_nearby_places_result {
  success: Boolean!
  places: [search_nearby_place!]!
  total: Int!
  fromCache: Int!
  fromBigQuery: Int!
  queryInfo: search_query_info!
  error: String
}

type search_nearby_place {
  id: String!
  overture_id: String
  name: String!
  display_name: String
  primary_category: String!
  categories: [String!]!
  confidence: Float
  location: String!
  street_address: String
  locality: String
  region: String
  postcode: String
  country_code: String
  phone: String
  website: String
  email: String
  hours: String
  price_level: Int
  rating: Float
  review_count: Int
  is_verified: Boolean
  distance_meters: Int
}

type search_query_info {
  center: search_location_info!
  radius: Int!
  categories: [String!]!
}

type search_location_info {
  lat: Float!
  lng: Float!
}

type refresh_places_result {
  success: Boolean!
  places_refreshed: Int
  duration_ms: Int
  categories_included: Int
  data_source: String!
  error: String
  timestamp: String!
}

type ProcessRecipePhotoOutput {
  success: Boolean!
  recipesCreated: Int!
  totalIngredients: Int!
  enhancementsApplied: Int!
  results: [ProcessRecipePhotoResult!]!
  menuAnalysis: MenuAnalysis
}

type ProcessRecipePhotoResult {
  recipeId: String
  recipeName: String!
  success: Boolean!
  ingredientsCreated: Int
  instructionsCreated: Int
  error: String
}

type MenuAnalysis {
  restaurant_type: String
  recipes_extracted: Int
  extraction_method: String
}

input ReviewUserPlaceInput {
  name: String!
  categories: [String!]!
  latitude: Float!
  longitude: Float!
  street_address: String
  locality: String
  region: String
  country_code: String
  phone: String
  website: String
  description: String
}

type ReviewUserPlaceOutput {
  approved: Boolean!
  confidence_adjustment: Float!
  enriched_description: String
  suggested_categories: [String!]
  rejection_reason: String
  flags: [String!]!
}

