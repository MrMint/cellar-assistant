table:
  name: place_refresh_jobs
  schema: public
event_triggers:
  - name: process_place_refresh_batch
    definition:
      enable_manual: true
      insert:
        columns: '*'
      update:
        columns:
          - cursor
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/processPlaceRefreshBatch'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
