table:
  name: item_onboardings
  schema: public
object_relationships:
  - name: back_label_image
    using:
      foreign_key_constraint_on: back_label_image_id
  - name: front_label_image
    using:
      foreign_key_constraint_on: front_label_image_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
array_relationships:
  - name: beers
    using:
      foreign_key_constraint_on:
        column: item_onboarding_id
        table:
          name: beers
          schema: public
  - name: coffees
    using:
      foreign_key_constraint_on:
        column: item_onboarding_id
        table:
          name: coffees
          schema: public
  - name: spirits
    using:
      foreign_key_constraint_on:
        column: item_onboarding_id
        table:
          name: spirits
          schema: public
  - name: wines
    using:
      foreign_key_constraint_on:
        column: item_onboarding_id
        table:
          name: wines
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        user_id: X-Hasura-User-Id
      columns:
        - barcode
        - barcode_type
        - front_label_image_id
        - back_label_image_id
        - raw_defaults
        - defaults
        - item_type
        - status
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - user_id
        - created_at
        - updated_at
        - status
        - barcode
        - barcode_type
        - front_label_image_id
        - back_label_image_id
        - raw_defaults
        - defaults
        - item_type
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - barcode
        - barcode_type
        - front_label_image_id
        - back_label_image_id
        - raw_defaults
        - defaults
        - item_type
        - status
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
