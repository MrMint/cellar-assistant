table:
  name: item_image
  schema: public
object_relationships:
  - name: beer
    using:
      foreign_key_constraint_on: beer_id
  - name: coffee
    using:
      foreign_key_constraint_on: coffee_id
  - name: file
    using:
      foreign_key_constraint_on: file_id
  - name: sake
    using:
      foreign_key_constraint_on: sake_id
  - name: spirit
    using:
      foreign_key_constraint_on: spirit_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: wine
    using:
      foreign_key_constraint_on: wine_id
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        user_id: X-Hasura-User-Id
      columns:
        - beer_id
        - coffee_id
        - file_id
        - is_public
        - placeholder
        - sake_id
        - spirit_id
        - wine_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - beer_id
        - coffee_id
        - created_at
        - file_id
        - id
        - is_public
        - placeholder
        - sake_id
        - spirit_id
        - updated_at
        - user_id
        - wine_id
      filter:
        _or:
          - is_public:
              _eq: true
          - user_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - is_public
        - placeholder
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
event_triggers:
  - name: generate_item_image_vector
    definition:
      enable_manual: true
      insert:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/generateItemImageVector'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
