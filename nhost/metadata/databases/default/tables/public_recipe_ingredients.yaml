table:
  name: recipe_ingredients
  schema: public
object_relationships:
  - name: beer
    using:
      foreign_key_constraint_on: beer_id
  - name: coffee
    using:
      foreign_key_constraint_on: coffee_id
  - name: generic_item
    using:
      foreign_key_constraint_on: generic_item_id
  - name: recipe
    using:
      foreign_key_constraint_on: recipe_id
  - name: sake
    using:
      foreign_key_constraint_on: sake_id
  - name: spirit
    using:
      foreign_key_constraint_on: spirit_id
  - name: wine
    using:
      foreign_key_constraint_on: wine_id
insert_permissions:
  - role: user
    permission:
      check:
        recipe:
          created_by_id:
            _eq: X-Hasura-User-Id
      columns:
        - beer_id
        - coffee_id
        - generic_item_id
        - is_optional
        - quantity
        - substitution_notes
        - unit
        - recipe_id
        - sake_id
        - spirit_id
        - wine_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - beer_id
        - coffee_id
        - created_at
        - generic_item_id
        - id
        - is_optional
        - quantity
        - substitution_notes
        - unit
        - recipe_id
        - sake_id
        - spirit_id
        - wine_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - is_optional
        - quantity
        - substitution_notes
        - unit
      filter:
        recipe:
          created_by_id:
            _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        recipe:
          created_by_id:
            _eq: X-Hasura-User-Id
    comment: ""
