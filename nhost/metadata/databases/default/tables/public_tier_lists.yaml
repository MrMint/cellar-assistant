table:
  name: tier_lists
  schema: public
object_relationships:
  - name: createdBy
    using:
      foreign_key_constraint_on: created_by_id
array_relationships:
  - name: items
    using:
      foreign_key_constraint_on:
        column: tier_list_id
        table:
          name: tier_list_items
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        created_by_id: X-Hasura-User-Id
      columns:
        - name
        - description
        - privacy
        - list_type
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - name
        - description
        - created_by_id
        - privacy
        - list_type
        - is_editing_locked
        - created_at
        - updated_at
        - content_updated_at
        - ai_insights
        - insights_generated_at
      filter:
        _or:
          - privacy:
              _eq: PUBLIC
          - _and:
              - privacy:
                  _eq: FRIENDS
              - createdBy:
                  friends:
                    friend_id:
                      _eq: X-Hasura-User-Id
          - created_by_id:
              _eq: X-Hasura-User-Id
      allow_aggregations: true
update_permissions:
  - role: user
    permission:
      columns:
        - name
        - description
        - privacy
        - is_editing_locked
      filter:
        created_by_id:
          _eq: X-Hasura-User-Id
      check: null
delete_permissions:
  - role: user
    permission:
      filter:
        created_by_id:
          _eq: X-Hasura-User-Id
event_triggers:
  - name: generate_tier_list_insights
    definition:
      enable_manual: true
      update:
        columns:
          - content_updated_at
    retry_conf:
      interval_sec: 30
      num_retries: 1
      timeout_sec: 120
    webhook: '{{NHOST_FUNCTIONS_URL}}/generateTierListInsights'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
