table:
  name: cellar_owners
  schema: public
object_relationships:
  - name: cellar
    using:
      foreign_key_constraint_on: cellar_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
insert_permissions:
  - role: user
    permission:
      check:
        cellar:
          created_by_id:
            _eq: X-Hasura-User-Id
      columns:
        - cellar_id
        - user_id
select_permissions:
  - role: user
    permission:
      columns:
        - created_at
        - updated_at
        - cellar_id
        - user_id
      filter:
        _or:
          - cellar:
              privacy:
                _eq: PUBLIC
          - cellar:
              created_by_id:
                _eq: X-Hasura-User-Id
          - user_id:
              _eq: X-Hasura-User-Id
delete_permissions:
  - role: user
    permission:
      filter:
        cellar:
          created_by_id:
            _eq: X-Hasura-User-Id
