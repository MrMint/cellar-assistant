table:
  name: place_menus
  schema: public
array_relationships:
  - name: place_menu_items
    using:
      foreign_key_constraint_on:
        column: place_menu_id
        table:
          name: place_menu_items
          schema: public
object_relationships:
  - name: created_by_user
    using:
      foreign_key_constraint_on: created_by
    comment: User who created this menu
  - name: place
    using:
      foreign_key_constraint_on: place_id
    comment: The place this menu belongs to
  - name: verified_by_user
    using:
      foreign_key_constraint_on: verified_by
    comment: User who verified this menu
select_permissions:
  - role: user
    permission:
      columns:
        - id
        - place_id
        - menu_data
        - menu_type
        - source
        - source_url
        - discovery_method
        - confidence_score
        - version
        - is_current
        - valid_from
        - valid_until
        - created_by
        - verified_by
        - discovered_at
        - created_at
        - updated_at
      filter: {}
      allow_aggregations: true
    comment: Users can view all place menus
