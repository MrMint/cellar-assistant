table:
  name: item_match_suggestions
  schema: public
object_relationships:
  - name: acted_by_user
    using:
      foreign_key_constraint_on: acted_by
  - name: place_menu_item
    using:
      foreign_key_constraint_on: place_menu_item_id
  - name: suggested_beer
    using:
      foreign_key_constraint_on: suggested_beer_id
  - name: suggested_coffee
    using:
      foreign_key_constraint_on: suggested_coffee_id
  - name: suggested_recipe
    using:
      foreign_key_constraint_on: suggested_recipe_id
  - name: suggested_sake
    using:
      foreign_key_constraint_on: suggested_sake_id
  - name: suggested_spirit
    using:
      foreign_key_constraint_on: suggested_spirit_id
  - name: suggested_wine
    using:
      foreign_key_constraint_on: suggested_wine_id
insert_permissions:
  - role: user
    permission:
      check: {}
      columns:
        - accepted
        - confidence_score
        - match_reasoning
        - place_menu_item_id
        - rejected
        - similarity_metrics
        - suggested_beer_id
        - suggested_coffee_id
        - suggested_recipe_id
        - suggested_sake_id
        - suggested_spirit_id
        - suggested_wine_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - accepted
        - acted_at
        - acted_by
        - confidence_score
        - created_at
        - id
        - match_reasoning
        - place_menu_item_id
        - rejected
        - similarity_metrics
        - suggested_beer_id
        - suggested_coffee_id
        - suggested_recipe_id
        - suggested_sake_id
        - suggested_spirit_id
        - suggested_wine_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - accepted
        - acted_at
        - acted_by
        - rejected
      filter:
        _or:
          - acted_by:
              _eq: X-Hasura-User-Id
          - acted_by:
              _is_null: true
      check: null
      set:
        acted_by: X-Hasura-User-Id
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        acted_by:
          _eq: X-Hasura-User-Id
    comment: ""
