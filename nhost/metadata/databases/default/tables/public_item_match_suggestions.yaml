table:
  name: item_match_suggestions
  schema: public
object_relationships:
  - name: beer
    using:
      foreign_key_constraint_on: beer_id
  - name: coffee
    using:
      foreign_key_constraint_on: coffee_id
  - name: sake
    using:
      foreign_key_constraint_on: sake_id
  - name: spirit
    using:
      foreign_key_constraint_on: spirit_id
  - name: user
    using:
      foreign_key_constraint_on: user_id
  - name: wine
    using:
      foreign_key_constraint_on: wine_id
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        user_id: X-Hasura-User-Id
      columns:
        - beer_id
        - coffee_id
        - confidence_score
        - is_processed
        - sake_id
        - spirit_id
        - suggestion_text
        - wine_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - beer_id
        - coffee_id
        - confidence_score
        - created_at
        - id
        - is_processed
        - sake_id
        - spirit_id
        - suggestion_text
        - updated_at
        - user_id
        - wine_id
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - is_processed
      filter:
        user_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        user_id:
          _eq: X-Hasura-User-Id
    comment: ""
