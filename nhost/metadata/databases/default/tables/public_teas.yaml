table:
  name: teas
  schema: public
object_relationships:
  - name: barcode
    using:
      foreign_key_constraint_on: barcode_code
  - name: createdBy
    using:
      foreign_key_constraint_on: created_by_id
array_relationships:
  - name: brands
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: item_brands
          schema: public
  - name: cellar_items
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: cellar_items
          schema: public
  - name: item_favorites
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: item_favorites
          schema: public
  - name: item_images
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: item_image
          schema: public
  - name: item_vectors
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: item_vectors
          schema: public
  - name: recipe_ingredients
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: recipe_ingredients
          schema: public
  - name: reviews
    using:
      foreign_key_constraint_on:
        column: tea_id
        table:
          name: item_reviews
          schema: public
insert_permissions:
  - role: user
    permission:
      check: {}
      set:
        created_by_id: X-Hasura-User-Id
      columns:
        - barcode_code
        - caffeine_level
        - category
        - country
        - cultivar
        - description
        - flavor_profile
        - form
        - harvest_year
        - ingredients
        - is_fair_trade
        - is_organic
        - item_onboarding_id
        - name
        - oxidation_level
        - processing
        - region
        - steeping_temperature
        - steeping_time
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - barcode_code
        - caffeine_level
        - category
        - country
        - created_at
        - created_by_id
        - cultivar
        - description
        - flavor_profile
        - form
        - harvest_year
        - id
        - ingredients
        - is_fair_trade
        - is_organic
        - item_onboarding_id
        - name
        - oxidation_level
        - processing
        - region
        - steeping_temperature
        - steeping_time
        - updated_at
      filter: {}
      allow_aggregations: true
      query_root_fields:
        - select
        - select_by_pk
        - select_aggregate
      subscription_root_fields:
        - select
        - select_by_pk
        - select_aggregate
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - barcode_code
        - caffeine_level
        - category
        - country
        - cultivar
        - description
        - flavor_profile
        - form
        - harvest_year
        - ingredients
        - is_fair_trade
        - is_organic
        - name
        - oxidation_level
        - processing
        - region
        - steeping_temperature
        - steeping_time
      filter:
        created_by_id:
          _eq: X-Hasura-User-Id
      check: {}
    comment: ""
event_triggers:
  - name: generate_tea_vector
    definition:
      enable_manual: true
      insert:
        columns: '*'
      update:
        columns: '*'
    retry_conf:
      interval_sec: 10
      num_retries: 3
      timeout_sec: 60
    webhook: '{{NHOST_FUNCTIONS_URL}}/generateItemVector'
    headers:
      - name: nhost-webhook-secret
        value_from_env: NHOST_WEBHOOK_SECRET
