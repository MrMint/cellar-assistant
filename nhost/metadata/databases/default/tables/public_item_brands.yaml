table:
  name: item_brands
  schema: public
object_relationships:
  - name: beer
    using:
      foreign_key_constraint_on: beer_id
  - name: brand
    using:
      foreign_key_constraint_on: brand_id
  - name: coffee
    using:
      foreign_key_constraint_on: coffee_id
  - name: sake
    using:
      foreign_key_constraint_on: sake_id
  - name: spirit
    using:
      foreign_key_constraint_on: spirit_id
  - name: wine
    using:
      foreign_key_constraint_on: wine_id
insert_permissions:
  - role: user
    permission:
      check:
        _or:
          - beer:
              created_by_id:
                _eq: X-Hasura-User-Id
          - wine:
              created_by_id:
                _eq: X-Hasura-User-Id
          - spirit:
              created_by_id:
                _eq: X-Hasura-User-Id
          - coffee:
              created_by_id:
                _eq: X-Hasura-User-Id
          - sake:
              created_by_id:
                _eq: X-Hasura-User-Id
      columns:
        - beer_id
        - brand_id
        - coffee_id
        - is_primary
        - sake_id
        - spirit_id
        - wine_id
    comment: ""
select_permissions:
  - role: user
    permission:
      columns:
        - beer_id
        - brand_id
        - coffee_id
        - created_at
        - id
        - is_primary
        - sake_id
        - spirit_id
        - wine_id
      filter: {}
      allow_aggregations: true
    comment: ""
update_permissions:
  - role: user
    permission:
      columns:
        - is_primary
      filter:
        _or:
          - beer:
              created_by_id:
                _eq: X-Hasura-User-Id
          - wine:
              created_by_id:
                _eq: X-Hasura-User-Id
          - spirit:
              created_by_id:
                _eq: X-Hasura-User-Id
          - coffee:
              created_by_id:
                _eq: X-Hasura-User-Id
          - sake:
              created_by_id:
                _eq: X-Hasura-User-Id
      check: {}
    comment: ""
delete_permissions:
  - role: user
    permission:
      filter:
        _or:
          - beer:
              created_by_id:
                _eq: X-Hasura-User-Id
          - wine:
              created_by_id:
                _eq: X-Hasura-User-Id
          - spirit:
              created_by_id:
                _eq: X-Hasura-User-Id
          - coffee:
              created_by_id:
                _eq: X-Hasura-User-Id
          - sake:
              created_by_id:
                _eq: X-Hasura-User-Id
    comment: ""
